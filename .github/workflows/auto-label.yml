name: Auto Label PR

on:
  pull_request:
    branches: [master]
    paths: ['README.md']

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label by Category
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Detect modified sections and label
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            const diff = execSync(
              `git diff origin/${{ github.base_ref }}...HEAD -- README.md`,
              { encoding: 'utf8' }
            );

            const sections = new Set();
            let currentSection = null;

            for (const line of diff.split('\n')) {
              const raw = line.startsWith('+') || line.startsWith('-') || line.startsWith(' ')
                ? line.slice(1)
                : line;
              const match = raw.match(/^### (.+)$/);
              if (match) {
                currentSection = match[1].trim();
              }
              if ((line.startsWith('+') && !line.startsWith('+++')) && currentSection) {
                if (line.includes('](') && line.includes('|')) {
                  sections.add(currentSection);
                }
              }
            }

            if (sections.size === 0) {
              console.log('No category sections detected in changes.');
              return;
            }

            const labels = [...sections].map(s => `category: ${s}`);
            console.log(`Adding labels: ${labels.join(', ')}`);

            // Ensure labels exist (create if needed)
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: '0e8a16',
                    description: `PRs modifying the ${label.replace('category: ', '')} section`,
                  });
                }
              }
            }

            // Count added vs removed entries to detect type
            let added = 0;
            let removed = 0;
            for (const line of diff.split('\n')) {
              if (line.startsWith('+') && !line.startsWith('+++') && line.includes('](') && line.includes('|')) {
                added++;
              }
              if (line.startsWith('-') && !line.startsWith('---') && line.includes('](') && line.includes('|')) {
                removed++;
              }
            }

            if (added > 0 && removed === 0) {
              labels.push('new entry');
            } else if (removed > 0 && added === 0) {
              labels.push('removal');
            } else if (added > 0 && removed > 0) {
              labels.push('modification');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });
